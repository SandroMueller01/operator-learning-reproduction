experiment:
  name: boussinesq_affine_d4
  problem: boussinesq
  coefficient: affine
  dimension: 4
  targets: [u, phi, p]

domain:
  type: unit_cube
  x_min: 0.0
  x_max: 1.0
  y_min: 0.0
  y_max: 1.0
  z_min: 0.0
  z_max: 1.0

grid:
  nx: 8
  ny: 8
  nz: 8
  include_boundary: true

pde:
  equation: stationary_boussinesq
  boundary_conditions:
    type: paper_like
  viscosity:
    parametrized: true
  thermal_conductivity:
    parametrized: true
  pressure_normalization: zero_mean

coefficient:
  name: affine
  base_value: 2.62
  formula: "2.62 + sum_j x_j sin(pi z_1 j) / j^(3/2)"

data:
  train_sizes: [10, 20, 50, 100, 200, 500]
  test_size: 500
  seeds: [0, 1, 2]
  dtype: float32

paths:
  output_dir: data/processed/boussinesq_affine_d4
