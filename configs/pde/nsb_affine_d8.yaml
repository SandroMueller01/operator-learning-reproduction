experiment:
  name: nsb_affine_d8
  problem: navier_stokes_brinkman
  coefficient: affine
  dimension: 8
  targets: [u, p]

domain:
  type: unit_square
  x_min: 0.0
  x_max: 1.0
  y_min: 0.0
  y_max: 1.0

grid:
  nx: 16
  ny: 16
  include_boundary: true

pde:
  equation: navier_stokes_brinkman
  boundary_conditions:
    type: paper_like
  viscosity:
    parametrized: true
  pressure_normalization: zero_mean

coefficient:
  name: affine
  base_value: 2.62
  formula: "2.62 + sum_j x_j sin(pi z_1 j) / j^(3/2)"

data:
  train_sizes: [10, 20, 50, 100, 200, 500]
  test_size: 500
  seeds: [0, 1, 2]
  dtype: float32

paths:
  output_dir: data/processed/nsb_affine_d8
